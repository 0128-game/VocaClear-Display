<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VocaClear - Live Dashboard with Timer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            color: white; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }
        
        /* ヘッダー：パスワードとタイマー */
        .header { 
            height: 40vh; display: flex; border-bottom: 2px solid #334155;
        }
        .header-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .divider { width: 2px; background: #334155; height: 80%; align-self: center; }

        .pass-label { font-size: 1.5rem; color: #94a3b8; letter-spacing: 0.3rem; margin-bottom: 10px; }
        .password-box { 
            font-size: 8rem; font-family: 'Courier New', monospace; 
            font-weight: bold; color: var(--primary); letter-spacing: 0.5rem;
            text-shadow: 0 0 30px rgba(62, 207, 142, 0.3);
        }

        .timer-box { font-size: 8rem; font-weight: bold; font-family: monospace; color: var(--accent); }
        .timer-finished { color: #ef4444; animation: blink 1s infinite; }

        /* ランキング */
        .ranking-container { flex: 1; padding: 20px 40px; display: flex; flex-direction: column; align-items: center; }
        .ranking-title { font-size: 1.8rem; margin-bottom: 20px; color: #f8fafc; }
        
        .ranking-list { width: 100%; max-width: 900px; }
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); margin-bottom: 12px; padding: 15px 40px;
            border-radius: 15px; font-size: 2.2rem; font-weight: bold;
            transition: all 0.5s ease-in-out;
        }

        .updated { animation: flash 1s ease-out; }
        @keyframes flash {
            0% { background: var(--primary); color: #000; transform: scale(1.02); }
            100% { background: var(--card); color: #fff; transform: scale(1); }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .rank-num { width: 150px; color: #94a3b8; font-size: 1.5rem; }
        .rank-name { flex: 1; text-align: left; }
        .rank-score { color: var(--primary); width: 200px; text-align: right; }

        /* 操作パネル */
        .controls { position: absolute; top: 10px; left: 10px; display: flex; gap: 10px; z-index: 100; opacity: 0.2; transition: 0.3s; }
        .controls:hover { opacity: 1; }
        select, input, button { background: #334155; color: white; border: none; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="tableSelector" onchange="initDashboard()">
            <option value="">-- テーブルを選択 --</option>
        </select>
        <input type="number" id="timerInput" placeholder="分" style="width: 50px;">
        <button onclick="startTimer()">タイマー開始</button>
        <button onclick="toggleFullScreen()">全画面</button>
    </div>

    <div class="header">
        <div class="header-section">
            <div class="pass-label">PASS</div>
            <div id="passwordDisplay" class="password-box">----</div>
        </div>
        <div class="divider"></div>
        <div class="header-section">
            <div class="pass-label">TIME LEFT</div>
            <div id="timerDisplay" class="timer-box">00:00</div>
        </div>
    </div>

    <div class="ranking-container">
        <div class="ranking-title">🏆 CURRENT TOP 3</div>
        <div id="rankingList" class="ranking-list"></div>
    </div>

<script>
    const SUPABASE_URL = 'https://vcbhwpahrzdjbakflwvd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjYmh3cGFocnpkamJha2Zsd3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTEzMzEsImV4cCI6MjA5MjUyNzMzMX0.Uv71jxtuVhoofw7Z5daMB7JhGncUNQyRslTuGhl_KI0';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let lastData = [];
    let timerInterval;

    // --- タイマー機能 ---
    function startTimer() {
        clearInterval(timerInterval);
        const mins = parseInt(document.getElementById('timerInput').value) || 0;
        let timeLeft = mins * 60;

        const display = document.getElementById('timerDisplay');
        display.classList.remove('timer-finished');

        timerInterval = setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.innerText = "TIME UP";
                display.classList.add('timer-finished');
            }
            timeLeft--;
        }, 1000);
    }

    // --- 掲示板初期化 ---
    async function initDashboard() {
        const tableName = document.getElementById('tableSelector').value;
        if (!tableName) return;
        const { data: pData } = await supabase.from('table_passwords').select('password').eq('table_name', tableName).single();
        document.getElementById('passwordDisplay').innerText = pData ? pData.password : "----";
        updateRanking();
    }

    async function updateRanking() {
        const tableName = document.getElementById('tableSelector').value;
        if (!tableName) return;

        const { data } = await supabase
            .from('quiz_results')
            .select('nickname, score_percent, created_at')
            .eq('table_name', tableName)
            .order('score_percent', { ascending: false })
            .order('created_at', { ascending: true })
            .limit(3);

        if (data) {
            renderRanking(data);
            lastData = JSON.parse(JSON.stringify(data));
        }
    }

    function renderRanking(newData) {
        const listContainer = document.getElementById('rankingList');
        let lastScore = -1;
        let rank = 0;
        let html = "";

        newData.forEach((res, i) => {
            if (res.score_percent !== lastScore) rank = i + 1;
            lastScore = res.score_percent;

            const prevRes = lastData[i];
            const isChanged = !prevRes || prevRes.nickname !== res.nickname || prevRes.score_percent !== res.score_percent;
            const isTie = newData.filter(d => d.score_percent === res.score_percent).length > 1;
            const rankLabel = isTie ? `${rank}位タイ` : `${rank}位`;

            html += `
                <div class="rank-item ${isChanged && lastData.length > 0 ? 'updated' : ''}">
                    <div class="rank-num">${rankLabel}</div>
                    <div class="rank-name">${res.nickname}</div>
                    <div class="rank-score">${res.score_percent}%</div>
                </div>`;
        });
        listContainer.innerHTML = html;
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    async function loadTableList() {
        const { data } = await supabase.from('table_passwords').select('table_name');
        const selector = document.getElementById('tableSelector');
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.table_name;
            opt.textContent = item.table_name;
            selector.appendChild(opt);
        });
    }

    loadTableList();
    setInterval(updateRanking, 5000);
</script>
</body>
</html>
