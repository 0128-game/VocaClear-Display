<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VocaClear - Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        
        /* セクション管理 */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* ローディング */
        #loader { display: none; margin: 10px 0; color: var(--primary); font-weight: bold; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(62,207,142,.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 一覧表示 */
        .scroll-area { max-height: 300px; overflow-y: auto; border: 1px solid #eee; margin: 20px 0; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; }

        /* クイズ */
        .q-text { font-size: 2rem; margin: 30px 0; font-weight: bold; color: #1e293b; }
        .progress { font-size: 0.9rem; color: #64748b; margin-bottom: 10px; }
        #feedback { min-height: 30px; margin-top: 15px; font-weight: bold; }
        
        /* 結果画面 */
        .score { font-size: 3rem; color: var(--primary); font-weight: bold; margin: 20px 0; }
        /* 修正箇所：間違えた単語の強調スタイル */
        .wrong-word { background-color: #ffebee !important; }
        /* 修正箇所：完全に非表示にする（背景色と同じにして見えなくする） */
        .hidden-col { visibility: hidden; }
    </style>
</head>
<body>

    <div class="controls">
        <b style="color: var(--primary)">VocaClear Dashboard</b>
        <select id="tableSelector" onchange="initDashboard()">
            <option value="">-- テーブルを選択 --</option>
        </select>
        <input type="number" id="timerInput" placeholder="分" style="width: 60px;">
        <button class="btn-main" onclick="startTimer()">タイマー開始</button>
        <button class="btn-sub" onclick="toggleFullScreen()">全画面</button>
    </div>

    <div class="header">
        <div class="header-section">
            <div class="label">EXAM PASS</div>
            <div id="passwordDisplay" class="display-value">----</div>
        </div>
        <div class="divider"></div>
        <div class="header-section">
            <div class="label">TIME LEFT</div>
            <div id="timerDisplay" class="display-value">00:00</div>
        </div>
    </div>

    <div class="ranking-container">
        <div class="ranking-title">🏆 TOP 3 RANKING</div>
        <div id="rankingList" class="ranking-list"></div>
    </div>

<script>
    // 1. 基本設定（重複宣言を避けるため一箇所にまとめます）
    const SUPABASE_URL = 'https://vcbhwpahrzdjbakflwvd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjYmh3cGFocnpjamJha2Zsd3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTEzMzEsImV4cCI6MjA5MjUyNzMzMX0.Uv71jxtuVhoofw7Z5daMB7JhGncUNQyRslTuGhl_KI0';
    
    // ここで一回だけ宣言
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let lastData = [];
    let timerInterval;

    // テーブルリストの取得
    async function loadTableList() {
        try {
            const { data, error } = await supabase.from('table_passwords').select('table_name');
            if (error) throw error;
            
            const selector = document.getElementById('tableSelector');
            selector.innerHTML = '<option value="">-- テーブルを選択 --</option>';
            
            if (data) {
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.table_name;
                    opt.textContent = item.table_name;
                    selector.appendChild(opt);
                });
            }
        } catch (err) {
            console.error("取得失敗:", err.message);
        }
    }

    // パスワード表示と初期描画
    async function initDashboard() {
        const tableName = document.getElementById('tableSelector').value;
        if (!tableName) return;

        const { data } = await supabase
            .from('table_passwords')
            .select('password')
            .eq('table_name', tableName)
            .single();

        document.getElementById('passwordDisplay').innerText = data ? data.password : "----";
        updateRanking();
    }

    // タイマー開始
    function startTimer() {
        clearInterval(timerInterval);
        const mins = parseInt(document.getElementById('timerInput').value) || 0;
        let timeLeft = mins * 60;
        const display = document.getElementById('timerDisplay');
        display.classList.remove('timer-finished');

        timerInterval = setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.innerText = "TIME UP";
                display.classList.add('timer-finished');
            }
            timeLeft--;
        }, 1000);
    }

    // ランキング取得と更新
    async function updateRanking() {
        const tableName = document.getElementById('tableSelector').value;
        if (!tableName) return;

        const { data } = await supabase
            .from('quiz_results')
            .select('nickname, score_percent, created_at')
            .eq('table_name', tableName)
            .order('score_percent', { ascending: false })
            .order('created_at', { ascending: true })
            .limit(3);

        if (data) {
            renderRanking(data);
            lastData = JSON.parse(JSON.stringify(data));
        }
    }

    // ランキング描画
    function renderRanking(newData) {
        const listContainer = document.getElementById('rankingList');
        let lastScore = -1;
        let rank = 0;
        let html = "";

        newData.forEach((res, i) => {
            if (res.score_percent !== lastScore) rank = i + 1;
            lastScore = res.score_percent;

            const prevRes = lastData[i];
            // 前回と違うデータがある時だけ更新アニメーション（updatedクラス）を付与
            const isChanged = !prevRes || prevRes.nickname !== res.nickname || prevRes.score_percent !== res.score_percent;
            const isTie = newData.filter(d => d.score_percent === res.score_percent).length > 1;
            const rankLabel = isTie ? `${rank}位タイ` : `${rank}位`;

            html += `
                <div class="rank-item ${isChanged && lastData.length > 0 ? 'updated' : ''}">
                    <div class="rank-num">${rankLabel}</div>
                    <div class="rank-name">${res.nickname}</div>
                    <div class="rank-score">${res.score_percent}%</div>
                </div>`;
        });
        listContainer.innerHTML = html;
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // 起動時の初期処理
    loadTableList();
    setInterval(updateRanking, 5000); // 5秒おきにランキングチェック
</script>
</body>
</html>
